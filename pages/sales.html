<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sales Chart - MedReturn Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body,html{
margin:0;
padding:0;
height:100%;
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
background:url('../images/bg.jpg') no-repeat center center fixed;
background-size:cover;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:0;
}

.content{
position:relative;
z-index:1;
min-height:100vh;
padding:90px 20px;
}

.chart-card{
background:rgba(255,255,255,0.95);
border-radius:12px;
padding:30px;
box-shadow:0 4px 15px rgba(0,0,0,0.3);
max-width:700px;
margin:auto;
text-align:center;
}

nav.navbar{
z-index:2;
}

</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
<div class="container">

<a class="navbar-brand fw-semibold" href="../index.html">
MedReturn Tracker
</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarNav">
<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="../index.html">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="add_medicine.html">Add Medicine</a>
</li>

<li class="nav-item">
<a class="nav-link" href="daily_sales.html">Daily Sales</a>
</li>

<li class="nav-item">
<a class="nav-link" href="reminder.html">Reminder</a>
</li>

<li class="nav-item">
<a class="nav-link" href="report.html">Report</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="sales.html">Sales Chart</a>
</li>

</ul>
</div>
</div>
</nav>


<div class="overlay"></div>


<div class="content container">

<h3 class="text-center text-white mb-4">
Total Sales Amount (₹) per Tablet
</h3>

<div class="chart-card">

<canvas id="salesPieChart" height="250"></canvas>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

async function loadSalesChart(){

try{

const res = await fetch("http://localhost:3000/sales-data");
const data = await res.json();

const labels = data.map(item => item.name);
const sales = data.map(item => item.total_sales);

const ctx = document.getElementById("salesPieChart").getContext("2d");

new Chart(ctx,{
type:"pie",
data:{
labels:labels,
datasets:[{
label:"Total Sales ₹",
data:sales,
backgroundColor:[
"#0d6efd",
"#198754",
"#ffc107",
"#dc3545",
"#6f42c1",
"#fd7e14",
"#20c997",
"#6610f2"
],
borderWidth:1
}]
},
options:{
responsive:true,
plugins:{
tooltip:{
callbacks:{
label:function(context){
return context.label + " : ₹" + context.raw;
}
}
},
legend:{
position:"bottom"
}
}
}

});

}
catch(err){

console.error("Error loading sales chart:",err);

}

}

window.addEventListener("DOMContentLoaded",loadSalesChart);

</script>

</body>
</html>

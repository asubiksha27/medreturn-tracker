<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - MedReturn Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body,html{
    margin:0;
    padding:0;
    height:100%;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}
body{
    background:url('../images/bg.jpg') no-repeat center center fixed;
    background-size:cover;
}
.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}
.login-box{
    position:relative;
    z-index:1;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}
.card{
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.3);
    padding:30px;
    background:rgba(255,255,255,0.95);
    width:100%;
    max-width:400px;
}
.card h3{
    text-align:center;
    color:#198754;
    margin-bottom:25px;
    font-weight:700;
}
.btn-login{
    background:#198754;
    color:#fff;
    width:100%;
}
.btn-login:hover{
    background:#0f5132;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="login-box">
<div class="card">

<h3>Login</h3>

<input type="email" id="email" class="form-control mb-3" placeholder="Enter Email">
<input type="password" id="password" class="form-control mb-3" placeholder="Enter Password">

<button class="btn btn-login" onclick="login()">Login</button>

<p class="text-center mt-3">
Don't have account? <a href="signup.html">Signup</a>
</p>

</div>
</div>

<script>

async function login(){

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("http://localhost:3000/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if(data.message === "Login successful"){

        // save user
        localStorage.setItem("user", JSON.stringify(data.user));

        alert("Login successful");

        // go to index page
        window.location.href = "../index.html";
    }
    else{
        alert(data.error);
    }
}

</script>

</body>
</html>

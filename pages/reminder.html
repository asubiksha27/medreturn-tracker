<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Medicine Reminder - MedReturn Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body,html{
    margin:0;
    padding:0;
    height:100%;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}
body{
    background:url('../images/bg.jpg') no-repeat center center fixed;
    background-size:cover;
}
.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    z-index:0;
}
.content{
    position:relative;
    z-index:1;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:80px 15px 50px;
}
.card{
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.3);
    padding:30px;
    background:rgba(255,255,255,0.95);
    width:100%;
    max-width:1100px;
}
.card h3{
    text-align:center;
    color:#198754;
    margin-bottom:25px;
    font-weight:700;
}
thead th{
    background-color:#198754;
    color:#fff;
    text-align:center;
}
tbody td{
    text-align:center;
    vertical-align:middle;
}

.alert-circle{
    display:inline-block;
    width:16px;
    height:16px;
    border-radius:50%;
    margin-right:6px;
}
.alert-high{ background:#dc3545; }
.alert-medium{ background:#ffc107; }
.alert-low{ background:#198754; }

.btn-returned{
    background:#198754;
    color:#fff;
    padding:5px 10px;
    border:none;
    border-radius:5px;
    margin-right:5px;
}
.btn-returned:hover{ background:#0f5132; }

.btn-missed{
    background:#dc3545;
    color:#fff;
    padding:5px 10px;
    border:none;
    border-radius:5px;
}
.btn-missed:hover{ background:#8b1c13; }

nav.navbar{ z-index:2; }
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
<div class="container">
<a class="navbar-brand fw-semibold" href="../index.html">MedReturn Tracker</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="navbarNav">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="add_medicine.html">Add Medicine</a></li>
<li class="nav-item"><a class="nav-link" href="daily_sales.html">Daily Sales</a></li>
<li class="nav-item"><a class="nav-link active" href="reminder.html">Reminder</a></li>
<li class="nav-item"><a class="nav-link" href="report.html">Report</a></li>
</ul>
</div>
</div>
</nav>

<div class="overlay"></div>

<div class="content">
<div class="card">
<h3>Medicine Reminders</h3>

<div class="table-responsive">
<table class="table table-bordered table-hover align-middle">
<thead>
<tr>
<th>Medicine Name</th>
<th>Batch Number</th>
<th>Remaining Qty</th>
<th>Return Date</th>
<th>Expiry Date</th>
<th>Days Left</th>
<th>Alert</th>
<th>Action</th>
</tr>
</thead>

<tbody id="reminderTable"></tbody>
</table>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
async function loadReminders(){
    try{
        const res = await fetch('http://localhost:3000/reminder');
        const data = await res.json();
        const tbody = document.getElementById('reminderTable');
        tbody.innerHTML = '';

        data.forEach(med => {

            let alertClass = 'alert-low';
            if(med.alert === 'high') alertClass = 'alert-high';
            else if(med.alert === 'medium') alertClass = 'alert-medium';

            const tr = document.createElement('tr');
            tr.innerHTML = `
<td>${med.name}</td>
<td>${med.batchNumber || '-'}</td>
<td>${med.remainingQty}</td>
<td>${med.returnDate}</td>
<td>${med.expiryDate}</td>
<td>${med.daysLeft}</td>
<td>
  <span class="alert-circle ${alertClass}"></span>
  ${med.alert.toUpperCase()}
</td>
<td>
  <button class="btn-returned" onclick="markStatus(${med.id}, 'Returned', this)">Returned</button>
  <button class="btn-missed" onclick="markStatus(${med.id}, 'Missed', this)">Missed</button>
</td>
`;
            tbody.appendChild(tr);
        });

    }catch(err){
        console.error(err);
        document.getElementById('reminderTable').innerHTML =
          `<tr><td colspan="8">Failed to load reminders</td></tr>`;
    }
}

async function markStatus(id, status, btn){
    try{
        const res = await fetch('http://localhost:3000/mark-status',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ id, status })
        });

        const data = await res.json();
        alert(data.message);

        // Remove row
        btn.closest('tr').remove();

        // Reload report page charts if opened
        if(window.reloadCharts) window.reloadCharts();

    }catch(err){
        console.error(err);
        alert('Status update failed!');
    }
}

window.addEventListener('DOMContentLoaded', loadReminders);
</script>

</body>
</html>

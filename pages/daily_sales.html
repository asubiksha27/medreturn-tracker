<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Sales - MedReturn Tracker</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body,html{margin:0;padding:0;height:100%;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
body{background:url('../images/bg.jpg') no-repeat center center fixed;background-size:cover;}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:0;}
.content{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px 15px 50px;}
.card{border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.3);padding:30px;background:rgba(255,255,255,0.95);width:100%;max-width:700px;}
.card h3{text-align:center;color:#198754;margin-bottom:25px;font-weight:700;}
.form-control{border-radius:8px;}
.btn-primary{background:#198754;border:none;padding:10px 25px;font-size:1rem;}
.btn-primary:hover{background:#0f5132;}
nav.navbar{z-index:2;}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
<div class="container">
<a class="navbar-brand fw-semibold" href="../index.html">MedReturn Tracker</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="navbarNav">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="add_medicine.html">Add Medicine</a></li>
<li class="nav-item"><a class="nav-link active" href="daily_sales.html">Daily Sales</a></li>
<li class="nav-item"><a class="nav-link" href="reminder.html">Reminder</a></li>
<li class="nav-item"><a class="nav-link" href="report.html">Report</a></li>
</ul>
</div>
</div>
</nav>

<div class="overlay"></div>

<div class="content">
<div class="card">
<h3>Record Daily Sales</h3>
<form id="salesForm">
<div class="mb-3">
<label class="form-label">Select Medicine</label>
<select id="medicineId" class="form-select" required>
<option value="">-- Select Medicine --</option>
</select>
</div>
<div class="mb-3">
<label class="form-label">Quantity Sold</label>
<input type="number" id="soldQty" class="form-control" min="1" required>
</div>
<div class="text-center mt-4">
<button type="submit" class="btn btn-primary">Update Sales</button>
</div>
</form>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Load medicines into dropdown
async function loadMedicines(){
    try{
        const res = await fetch('http://localhost:3000/medicines');
        const meds = await res.json();
        const select = document.getElementById('medicineId');
        select.innerHTML = '<option value="">-- Select Medicine --</option>'; // reset
        meds.forEach(m=>{
            const remaining = m.quantity - m.sold_qty;
            if(remaining>0){
                const option = document.createElement('option');
                option.value = m.id;
                option.textContent = `${m.name} (Available: ${remaining})`;
                select.appendChild(option);
            }
        });
    }catch(err){console.error(err);}
}

// Handle sales form submit
document.getElementById('salesForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const medicineId = document.getElementById('medicineId').value;
    const soldQty = parseInt(document.getElementById('soldQty').value);

    try{
        const res = await fetch('http://localhost:3000/sell-medicine',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({medicineId,soldQty})
        });
        const data = await res.json();
        if(data.error) alert(data.error);
        else alert(data.message);

        e.target.reset();
        loadMedicines(); // reload dropdown after selling
    }catch(err){
        console.error(err);
        alert('Error updating sales!');
    }
});

window.addEventListener('DOMContentLoaded', loadMedicines);
</script>
</body>
</html>

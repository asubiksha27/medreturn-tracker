<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Medicine Report - MedReturn Tracker</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
body {
    background: url('../images/bg.jpg') no-repeat center center fixed;
    background-size: cover;
}
.overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 0;
}
.content {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding: 80px 15px 50px;
}
.card-summary {
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    padding: 20px;
    background: rgba(255,255,255,0.95);
    margin-bottom: 30px;
    text-align: center;
}
.card-summary h4 {
    margin-bottom: 15px;
}
nav.navbar {
    z-index: 2;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
<div class="container">
<a class="navbar-brand fw-semibold" href="../index.html">MedReturn Tracker</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="navbarNav">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="add_medicine.html">Add Medicine</a></li>
<li class="nav-item"><a class="nav-link" href="daily_sales.html">Daily Sales</a></li>
<li class="nav-item"><a class="nav-link" href="reminder.html">Reminder</a></li>
<li class="nav-item"><a class="nav-link active" href="report.html">Report</a></li>
</ul>
</div>
</div>
</nav>

<div class="overlay"></div>

<div class="content container">
<h3 class="text-center text-white mb-4">Medicine Report</h3>

<!-- Card 1 -->
<div class="card-summary">
<h4>Tablet-wise Sales</h4>
<canvas id="salesChart" height="150"></canvas>
</div>

<!-- Card 2 -->
<div class="card-summary">
<h4>Profit / Loss per Medicine</h4>
<canvas id="profitLossChart" height="150"></canvas>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
async function loadReport(){
    try{
        const res = await fetch('http://localhost:3000/report');
        const data = await res.json();

        // 1️⃣ Tablet-wise Sales
        const ctxSales = document.getElementById('salesChart').getContext('2d');
        new Chart(ctxSales, {
            type: 'bar',
            data: {
                labels: data.salesReport.map(
                    d => `${d.name} (${d.batchNumber})`
                ),
                datasets: [{
                    label: 'Quantity Sold',
                    data: data.salesReport.map(d => d.soldQty),
                    backgroundColor: 'rgba(25,135,84,0.7)',
                    borderColor: '#198754',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true },
                    x: { ticks: { autoSkip: false } }
                }
            }
        });

        // 2️⃣ Profit / Loss
        const ctxProfit = document.getElementById('profitLossChart').getContext('2d');
        new Chart(ctxProfit, {
            type: 'bar',
            data: {
                labels: data.salesReport.map(
                    d => `${d.name} (${d.batchNumber})`
                ),
                datasets: [
                    {
                        label: 'Profit (₹)',
                        data: data.salesReport.map(d =>
                            d.status === 'Returned' ? d.soldQty * d.price : 0
                        ),
                        backgroundColor: 'rgba(25,135,84,0.7)'
                    },
                    {
                        label: 'Loss (₹)',
                        data: data.salesReport.map(d =>
                            d.status === 'Missed'
                              ? (d.quantity - d.soldQty) * d.price
                              : 0
                        ),
                        backgroundColor: 'rgba(220,53,69,0.7)'
                    }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });

    } catch(err){
        console.error('Error loading report:', err);
    }
}

window.addEventListener('DOMContentLoaded', loadReport);
</script>

</body>
</html>

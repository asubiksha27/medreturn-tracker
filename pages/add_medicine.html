<div class="invalid-feedback"></div>

<script>

function showError(input,message){
input.classList.add("is-invalid")
input.nextElementSibling.innerText=message
}

function clearError(input){
input.classList.remove("is-invalid")
input.nextElementSibling.innerText=""
}

document.getElementById("addMedicineForm").addEventListener("submit",async function(e){

e.preventDefault()

let valid=true

const medicineName=document.getElementById("medicineName")
const batchNumber=document.getElementById("batchNumber")
const expiryDate=document.getElementById("expiryDate")
const returnDate=document.getElementById("returnDate")
const quantity=document.getElementById("quantity")
const price=document.getElementById("price")

clearError(medicineName)
clearError(batchNumber)
clearError(expiryDate)
clearError(returnDate)
clearError(quantity)
clearError(price)

const batchRegex=/^[A-Za-z0-9]+$/

// Medicine Name validation (only empty check)

if(medicineName.value.trim()===""){
showError(medicineName,"Medicine name is required")
valid=false
}

// Batch Number validation

if(batchNumber.value.trim()===""){
showError(batchNumber,"Batch number required")
valid=false
}
else if(!batchRegex.test(batchNumber.value)){
showError(batchNumber,"Only letters and numbers allowed")
valid=false
}

// Date validations

const today=new Date().toISOString().split("T")[0]

if(!expiryDate.value){
showError(expiryDate,"Expiry date required")
valid=false
}
else if(expiryDate.value<=today){
showError(expiryDate,"Expiry must be future date")
valid=false
}

if(!returnDate.value){
showError(returnDate,"Return date required")
valid=false
}
else if(returnDate.value>expiryDate.value){
showError(returnDate,"Return date must be before expiry")
valid=false
}

// Quantity validation

if(!quantity.value || quantity.value<=0){
showError(quantity,"Quantity must be greater than 0")
valid=false
}

// Price validation

if(price.value==="" || price.value<0){
showError(price,"Price must be 0 or greater")
valid=false
}

if(!valid) return

try{

const res=await fetch("http://localhost:3000/add-medicine",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

medicineName:medicineName.value,
batchNumber:batchNumber.value,
expiryDate:expiryDate.value,
returnDate:returnDate.value,
quantity:parseInt(quantity.value),
price:parseFloat(price.value)

})

})

const data=await res.json()

alert(data.message)

this.reset()

}catch(err){

alert("Error adding medicine!")

}

})

</script>

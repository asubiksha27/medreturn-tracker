<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Medicine - MedReturn Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html {margin:0;padding:0;height:100%;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
        body {background:url('../images/bg.jpg') no-repeat center center fixed;background-size:cover;}
        .overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:0;}
        .content{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px 15px 50px;}
        .card{border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.3);padding:30px;background:rgba(255,255,255,0.95);width:100%;max-width:600px;}
        .card h3{text-align:center;color:#198754;margin-bottom:25px;font-weight:700;}
        .form-control{border-radius:8px;}
        .btn-primary{background:#198754;border:none;padding:10px 25px;font-size:1rem;}
        .btn-primary:hover{background:#0f5132;}
        nav.navbar{z-index:2;}
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="../index.html">MedReturn Tracker</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="add_medicine.html">Add Medicine</a></li>
                <li class="nav-item"><a class="nav-link" href="daily_sales.html">Daily Sales</a></li>
                <li class="nav-item"><a class="nav-link" href="reminder.html">Reminder</a></li>
                <li class="nav-item"><a class="nav-link" href="report.html">Report</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="overlay"></div>

<div class="content">
    <div class="card">
        <h3>Add New Medicine</h3>
        <form id="addMedicineForm">
            <div class="mb-3">
                <label class="form-label">Medicine Name</label>
                <input type="text" class="form-control" id="medicineName" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Batch Number</label>
                <input type="text" class="form-control" id="batchNumber" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Expiry Date</label>
                <input type="date" class="form-control" id="expiryDate" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Return Date</label>
                <input type="date" class="form-control" id="returnDate" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Quantity</label>
                <input type="number" class="form-control" id="quantity" min="1" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Price (per unit)</label>
                <input type="number" class="form-control" id="price" min="0" step="0.01" required>
            </div>
            <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary">Add Medicine</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('addMedicineForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const medicineName = document.getElementById('medicineName').value;
    const batchNumber = document.getElementById('batchNumber').value;
    const expiryDate = document.getElementById('expiryDate').value;
    const returnDate = document.getElementById('returnDate').value;
    const quantity = parseInt(document.getElementById('quantity').value);
    const price = parseFloat(document.getElementById('price').value);

    try{
        const res = await fetch('http://localhost:3000/add-medicine',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({medicineName,batchNumber,expiryDate,returnDate,quantity,price})
        });
        const data = await res.json();
        alert(data.message);
        e.target.reset();
    }catch(err){
        console.error(err);
        alert('Error adding medicine!');
    }
});
</script>

</body>
</html>
